# DAKB Docker Compose Configuration
# ==================================
#
# Start all services:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f
#
# Stop services:
#   docker-compose down

version: '3.8'

services:
  # ==========================================================================
  # MongoDB - Primary Data Store
  # ==========================================================================
  mongodb:
    image: mongo:7.0
    container_name: dakb-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-dakb}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-dakb}
    volumes:
      - dakb-mongodb:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dakb-network

  # ==========================================================================
  # Embedding Service - Vector Embeddings
  # ==========================================================================
  embedding:
    build:
      context: ..
      dockerfile: docker/Dockerfile.embedding
    container_name: dakb-embedding
    restart: unless-stopped
    ports:
      - "127.0.0.1:${EMBEDDING_PORT:-3101}:3101"  # Loopback only for security
    environment:
      DAKB_EMBEDDING_HOST: "0.0.0.0"
      DAKB_EMBEDDING_PORT: "3101"
      DAKB_EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      DAKB_EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-mpnet-base-v2}
    volumes:
      - dakb-models:/app/models
      - dakb-faiss:/app/data/dakb_faiss
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3101/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Model loading takes time
    networks:
      - dakb-network
    deploy:
      resources:
        limits:
          memory: 2G

  # ==========================================================================
  # Redis - Real-time Pub/Sub (v2.0.0)
  # ==========================================================================
  # Backs the WebSocket pub/sub, presence, task-delegation, notification bus,
  # Session Bridge and Chat Bridge transports. The gateway degrades gracefully
  # when Redis is unavailable (real-time features disabled, REST still works).
  redis:
    image: redis:7-alpine
    container_name: dakb-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"  # Loopback only for security
    volumes:
      - dakb-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dakb-network

  # ==========================================================================
  # Gateway Service - REST API
  # ==========================================================================
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dakb-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3100}:3100"
    environment:
      DAKB_GATEWAY_HOST: "0.0.0.0"
      DAKB_GATEWAY_PORT: "3100"
      DAKB_JWT_SECRET: ${DAKB_JWT_SECRET:?DAKB_JWT_SECRET is required}
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-dakb}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-dakb}?authSource=admin
      DAKB_EMBEDDING_URL: http://embedding:3101
      DAKB_FAISS_DIR: /app/data/dakb_faiss
      DAKB_REDIS_URL: ${DAKB_REDIS_URL:-redis://redis:6379/0}
      DAKB_VAULT_LOCAL_BASE_PATH: /app/data/vault
      DAKB_LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - dakb-faiss:/app/data/dakb_faiss
      - dakb-vault:/app/data/vault
      - dakb-logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      embedding:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dakb-network

# ==========================================================================
# Networks
# ==========================================================================
networks:
  dakb-network:
    driver: bridge

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  dakb-mongodb:
    driver: local
  dakb-models:
    driver: local
  dakb-faiss:
    driver: local
  dakb-vault:
    driver: local
  dakb-redis:
    driver: local
  dakb-logs:
    driver: local
